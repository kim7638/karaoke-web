<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="챘짠챙쨈챠짭"/>
<meta name="theme-color" content="#0d0d12"/>
<link rel="manifest" href="manifest.json"/>
<title>챘짠챙쨈챠짭 챘쨍챘챘째짤</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}

body{
  background:#0d0d12;
  color:#f0f0f0;
  font-family:'Noto Sans KR',sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100dvh;
  padding:env(safe-area-inset-top) 24px env(safe-area-inset-bottom);
  gap:0;
}

/* subtle bg glow */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%, rgba(180,80,255,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 50% 100%, rgba(0,200,180,0.06) 0%, transparent 60%);
  pointer-events:none;
  z-index:0;
}

.wrap{
  position:relative;z-index:1;
  width:100%;max-width:360px;
  display:flex;flex-direction:column;
  align-items:center;gap:40px;
}

/* Title */
.title{text-align:center}
.title h1{
  font-family:'Black Han Sans',sans-serif;
  font-size:22px;letter-spacing:3px;
  background:linear-gradient(135deg,#cc88ff,#00e8cc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.title p{font-size:12px;color:#666;margin-top:6px;letter-spacing:0.5px}

/* BIG MIC BUTTON */
.mic-wrap{position:relative;display:flex;align-items:center;justify-content:center}

.ring{
  position:absolute;
  width:160px;height:160px;
  border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.06);
  animation:spin 8s linear infinite;
}
.ring:nth-child(2){width:190px;height:190px;animation-duration:12s;animation-direction:reverse}
@keyframes spin{to{transform:rotate(360deg)}}

.mic-btn{
  width:130px;height:130px;
  border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.04);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:6px;
  cursor:pointer;
  transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;z-index:2;
}
.mic-btn:active{transform:scale(0.94)}

.mic-btn.on{
  background:rgba(200,80,255,0.12);
  border-color:rgba(200,80,255,0.5);
}
.mic-btn.on .ring-pulse{
  animation:pulse 1.4s ease-out infinite;
}

.ring-pulse{
  position:absolute;inset:-20px;
  border-radius:50%;
  border:1.5px solid rgba(200,80,255,0.4);
  opacity:0;
}
@keyframes pulse{
  0%{transform:scale(0.85);opacity:0.8}
  100%{transform:scale(1.15);opacity:0}
}

.mic-icon{font-size:44px;line-height:1}
.mic-label{font-size:11px;font-weight:700;letter-spacing:1.5px;color:#666;transition:color 0.3s}
.mic-btn.on .mic-label{color:#cc88ff}

/* Status */
.status{
  display:flex;align-items:center;gap:8px;
  padding:8px 20px;
  border-radius:100px;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.03);
  font-size:13px;color:#555;
  transition:all 0.3s;
  min-width:200px;justify-content:center;
}
.status.on{
  border-color:rgba(0,232,200,0.3);
  background:rgba(0,232,200,0.07);
  color:#00e8cc;
}
.status.error{
  border-color:rgba(255,80,80,0.3);
  background:rgba(255,80,80,0.07);
  color:#ff6060;
}
.status-dot{
  width:7px;height:7px;border-radius:50%;
  background:currentColor;flex-shrink:0;
}
.status.on .status-dot{animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

/* Level meter */
.level{
  display:flex;align-items:flex-end;gap:3px;
  height:40px;width:100%;max-width:240px;
  justify-content:center;
}
.bar{
  width:6px;border-radius:3px;
  background:rgba(255,255,255,0.08);
  height:4px;
  transition:height 0.07s ease,background 0.07s ease;
  flex-shrink:0;
}

/* Volume */
.vol-section{width:100%}
.vol-row{
  display:flex;align-items:center;gap:12px;
  padding:14px 20px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:16px;
}
.vol-icon{font-size:20px;flex-shrink:0}
.vol-label{font-size:12px;color:#555;width:40px;flex-shrink:0}
input[type=range]{
  flex:1;-webkit-appearance:none;appearance:none;
  height:3px;border-radius:3px;
  background:linear-gradient(to right,#cc88ff var(--v,70%),rgba(255,255,255,0.1) var(--v,70%));
  outline:none;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:22px;height:22px;border-radius:50%;
  background:white;box-shadow:0 2px 6px rgba(0,0,0,0.5);
}
.vol-val{font-size:12px;color:#555;width:34px;text-align:right;flex-shrink:0}

/* Hint */
.hint{
  background:rgba(255,200,50,0.06);
  border:1px solid rgba(255,200,50,0.15);
  border-radius:14px;
  padding:14px 16px;
  font-size:12px;color:rgba(255,200,80,0.75);
  line-height:1.7;width:100%;
}
.hint strong{display:block;margin-bottom:4px;font-size:13px}

/* Install banner */
.install-hint{
  font-size:11px;color:#444;text-align:center;
  line-height:1.6;
}
.install-hint strong{color:#666}
</style>
</head>
<body>
<div class="wrap">

  <div class="title">
    <h1>챨짚 챘짠챙쨈챠짭</h1>
    <p>챙 챠챘쨍 챠챗쨀  횂쨌 챙쨈 챙짹 챘째짹챗쨌쨍챘쩌챙쨈챘 횂쨌 챘쨍챘</p>
  </div>

  <div class="mic-wrap">
    <div class="ring"></div>
    <div class="ring"></div>
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">
      <div class="ring-pulse"></div>
      <span class="mic-icon">챨챦쨍</span>
      <span class="mic-label" id="micLabel">챠짯챠챙짭 챙챙</span>
    </button>
  </div>

  <div class="status" id="status">
    <span class="status-dot"></span>
    <span id="statusTxt">챘짠챙쨈챠짭 챗쨘쩌챙짠</span>
  </div>

  <div class="level" id="level"></div>

  <div class="vol-section">
    <div class="vol-row">
      <span class="vol-icon">챨짚</span>
      <span class="vol-label">챘짧짤챙챘짝짭</span>
      <input type="range" id="micVol" min="0" max="200" value="100"
        oninput="onVol(this.value)" style="--v:50%"/>
      <span class="vol-val" id="volVal">100%</span>
    </div>
  </div>

  <div class="hint">
    <strong>챨징 챙짭챙짤챘짼</strong>
    1. 챘짭쨈챙  챙쨈챙쨈챠째 챙째짤챙짤<br>
    2. 챘짠챙쨈챠짭 챘짼챠쩌 챠짯 창 챗쨋챠 챠챙짤<br>
    3. 챠 챘짼챠쩌챙쩌챘징 챙쨈 챙짹챙 챘째짹챗쨌쨍챘쩌챙쨈챘챘징<br>
    4. YouTube챙챙 MR 챙짭챙<br>
    5. 챙쨈챙쨈챠째챙쩌챘징 MR + 챘쨈 챘짧짤챙챘짝짭 챘챙 챙짼짯챙쨌짢 챨쨉
  </div>

  <div class="install-hint">
    Safari 창 <strong>챗쨀쨉챙 </strong> 창 <strong>챠 챠챘짤쨈챙 챙쨋챗째</strong><br>
    챙짹챙짼챘쩌 챙짚챙쨔챠챘짤쨈 챘 챙챙 챙 챙쩌챘징 챙챘챠쨈챙
  </div>

</div>

<script>
// 창창 Level meter bars 창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창
const BARS = 28;
const levelEl = document.getElementById('level');
for(let i=0;i<BARS;i++){
  const b=document.createElement('div');
  b.className='bar';
  levelEl.appendChild(b);
}
const bars=[...levelEl.querySelectorAll('.bar')];

// 창창 Audio state 창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창
let ctx=null, micStream=null, micSrc=null, gainNode=null, analyser=null, raf=null;
let silentSrc=null; // iOS background keep-alive
let isOn=false;

function setStatus(type,txt){
  const el=document.getElementById('status');
  el.className='status '+type;
  document.getElementById('statusTxt').textContent=txt;
}

async function toggleMic(){
  if(isOn) stopMic(); else await startMic();
}

async function startMic(){
  try{
    setStatus('','챙째챗짼째 챙짚...');

    // 창  AudioContext 창 must be in user gesture
    if(!ctx){
      ctx=new (window.AudioContext||window.webkitAudioContext)({
        latencyHint:'interactive',
        sampleRate:44100
      });
    }
    if(ctx.state==='suspended') await ctx.resume();

    // 창징 Inaudible oscillator loop 창 iOS keeps audio session truly alive in background
    // Pure silence gets suspended; sub-20Hz oscillator is inaudible but keeps session open
    if(!silentSrc){
      silentSrc=ctx.createOscillator();
      const silentGain=ctx.createGain();
      silentGain.gain.value=0.00001; // inaudible but non-zero
      silentSrc.frequency.value=17;  // sub-sonic, can't hear it
      silentSrc.connect(silentGain);
      silentGain.connect(ctx.destination);
      silentSrc.start(0);
    }

    // 창짖 Mic
    const stream=await navigator.mediaDevices.getUserMedia({
      audio:{
        echoCancellation:true,
        noiseSuppression:true,
        autoGainControl:false,
      },
      video:false
    });

    micStream=stream;
    micSrc=ctx.createMediaStreamSource(stream);

    gainNode=ctx.createGain();
    gainNode.gain.value=parseInt(document.getElementById('micVol').value)/100;

    analyser=ctx.createAnalyser();
    analyser.fftSize=128;

    micSrc.connect(gainNode);
    gainNode.connect(analyser);
    gainNode.connect(ctx.destination);

    isOn=true;
    document.getElementById('micBtn').classList.add('on');
    document.getElementById('micLabel').textContent='챠짯챠챙짭 챘챗쨍째';
    setStatus('on','챨쨈 LIVE 창 챘짧짤챙챘짝짭 챙쨋챘 짜 챙짚');
    drawBars();

  }catch(err){
    console.error(err);
    if(err.name==='NotAllowedError'){
      setStatus('error','챘짠챙쨈챠짭 챗쨋챠 챗짹째챘쨋챘짢');
      alert('챘짠챙쨈챠짭 챗쨋챠챙 챠챙짤챠쨈 챙짙쩌챙쨍챙.\n챙짚챙  챙짹 창 Safari 창 챘짠챙쨈챠짭 창 챠챙짤');
    }else{
      setStatus('error','챙짚챘짜: '+err.message);
    }
  }
}

function stopMic(){
  if(micStream) micStream.getTracks().forEach(t=>t.stop());
  if(micSrc){micSrc.disconnect();micSrc=null;}
  if(gainNode){gainNode.disconnect();gainNode=null;}
  if(analyser){analyser.disconnect();analyser=null;}
  micStream=null;
  isOn=false;
  if(raf){cancelAnimationFrame(raf);raf=null;}
  bars.forEach(b=>{b.style.height='4px';b.style.background='rgba(255,255,255,0.08)';});
  document.getElementById('micBtn').classList.remove('on');
  document.getElementById('micLabel').textContent='챠짯챠챙짭 챙챙';
  setStatus('','챘짠챙쨈챠짭 챗쨘쩌챙짠');
}

function onVol(v){
  const pct=Math.round(v/200*100);
  document.getElementById('volVal').textContent=v+'%';
  document.getElementById('micVol').style.setProperty('--v',pct+'%');
  if(gainNode) gainNode.gain.value=v/100;
}

function drawBars(){
  if(!analyser){return;}
  const data=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  const step=Math.floor(data.length/BARS);
  bars.forEach((bar,i)=>{
    const v=data[i*step]/255;
    const h=Math.max(4,v*36);
    bar.style.height=h+'px';
    if(v>0.7) bar.style.background='#cc88ff';
    else if(v>0.3) bar.style.background='#00e8cc';
    else bar.style.background='rgba(255,255,255,0.12)';
  });
  raf=requestAnimationFrame(drawBars);
}

// 창창 PWA Service Worker 창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

// 창창 Visibility change 창 iOS background 챗째챙짠 창창창창창창창창창창창창창창창
document.addEventListener('visibilitychange',()=>{
  if(ctx && ctx.state==='suspended') ctx.resume().catch(()=>{});
});

// iOS PWA: pageshow fires when returning from background
window.addEventListener('pageshow',()=>{
  if(ctx && ctx.state==='suspended') ctx.resume().catch(()=>{});
});

// iOS: prevent audio session drop on focus
window.addEventListener('focus',()=>{
  if(ctx && ctx.state==='suspended') ctx.resume().catch(()=>{});
});
</script>
</body>
</html>
