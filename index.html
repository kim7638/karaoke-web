<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="챘짠챙쨈챠짭">
<meta name="theme-color" content="#0d0d12">
<link rel="manifest" href="./manifest.json">
<title>챘짠챙쨈챠짭 챘쨍챘챘째짤</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: #0d0d12;
  color: #f0f0f0;
  font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
  padding: env(safe-area-inset-top, 20px) 24px env(safe-area-inset-bottom, 20px);
}

.wrap {
  width: 100%;
  max-width: 340px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
}

h1 {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #cc88ff;
  text-align: center;
}

h1 span { color: #00e8cc; }

.sub {
  font-size: 13px;
  color: #555;
  text-align: center;
  margin-top: 6px;
  line-height: 1.5;
}

/* MIC BUTTON */
.mic-btn {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  border: 2px solid #333;
  background: #1a1a1a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  cursor: pointer;
  transition: all 0.25s;
  font-size: 48px;
  line-height: 1;
}

.mic-btn:active { transform: scale(0.93); }

.mic-btn.on {
  border-color: #cc88ff;
  background: #1e0e2e;
  box-shadow: 0 0 0 8px rgba(200,80,255,0.1), 0 0 0 16px rgba(200,80,255,0.05);
}

.mic-btn-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  color: #555;
}

.mic-btn.on .mic-btn-label { color: #cc88ff; }

/* STATUS */
.status {
  font-size: 14px;
  color: #444;
  padding: 8px 20px;
  border-radius: 100px;
  border: 1px solid #222;
  background: #111;
  text-align: center;
  min-width: 190px;
  transition: all 0.3s;
}

.status.on  { color: #00e8cc; border-color: #00e8cc44; background: #001a18; }
.status.err { color: #ff6060; border-color: #ff606044; background: #1a0000; }

/* LEVEL BARS */
.level {
  display: flex;
  align-items: flex-end;
  gap: 3px;
  height: 36px;
  width: 220px;
  justify-content: center;
}

.bar {
  width: 6px;
  border-radius: 3px;
  background: #222;
  height: 4px;
  transition: height 0.07s, background 0.07s;
}

/* VOLUME */
.vol-card {
  width: 100%;
  background: #111;
  border: 1px solid #222;
  border-radius: 16px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.vol-icon { font-size: 22px; }
.vol-label { font-size: 12px; color: #555; width: 44px; flex-shrink: 0; }

input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  height: 4px;
  border-radius: 4px;
  background: #333;
  outline: none;
  cursor: pointer;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.6);
}

.vol-val { font-size: 12px; color: #555; width: 36px; text-align: right; }

/* HINT */
.hint {
  width: 100%;
  background: #111a0a;
  border: 1px solid #2a3a1a;
  border-radius: 14px;
  padding: 14px 16px;
  font-size: 13px;
  color: #8a9;
  line-height: 1.8;
}

.hint strong { color: #adb; display: block; margin-bottom: 4px; }
</style>
</head>
<body>
<div class="wrap">

  <div>
    <h1>챨짚 챘짠챙쨈챠짭 <span>챘쨍챘챘째짤</span></h1>
    <p class="sub">챙 챠챘쨍 챠챗쨀  횂쨌 챙쨈 챙짹 챘째짹챗쨌쨍챘쩌챙쨈챘 횂쨌 챘쨍챘</p>
  </div>

  <button class="mic-btn" id="micBtn" onclick="toggle()">
    챨챦쨍
    <span class="mic-btn-label" id="btnTxt">챙챙</span>
  </button>

  <div class="status" id="status">챘짠챙쨈챠짭 챗쨘쩌챙짠</div>

  <div class="level" id="level"></div>

  <div class="vol-card">
    <span class="vol-icon">챨</span>
    <span class="vol-label">챘쨀쩌챘짜짢</span>
    <input type="range" id="vol" min="0" max="200" value="100" step="1" oninput="setVol(this.value)">
    <span class="vol-val" id="volVal">100%</span>
  </div>

  <div class="hint">
    <strong>챨징 챙짭챙짤챘짼</strong>
    1. 챙쨈챙쨈챠째 챘챘 챘쨍챘짙짢챠짭챙짚 챙째챗짼째<br>
    2. 챙챙 챘짼챠쩌 챠짯 창 챘짠챙쨈챠짭 챗쨋챠 챠챙짤<br>
    3. 챠 챘짼챠쩌챙쩌챘징 챙쨈 챙짹 챘째짹챗쨌쨍챘쩌챙쨈챘챘징<br>
    4. YouTube 챙짹챙챙 MR 챙짭챙<br>
    5. MR + 챘쨈 챘짧짤챙챘짝짭 챘챙챙 챘짚챘짝쩌 챨쨋
  </div>

</div>

<script>
// level bars
const N = 24;
const lv = document.getElementById('level');
for (let i = 0; i < N; i++) {
  const b = document.createElement('div');
  b.className = 'bar';
  lv.appendChild(b);
}
const bars = [...lv.querySelectorAll('.bar')];

let ctx, stream, src, gain, analyser, raf, osc;
let on = false;

function st(cls, txt) {
  const el = document.getElementById('status');
  el.className = 'status ' + cls;
  el.textContent = txt;
}

async function toggle() { on ? stop() : await start(); }

async function start() {
  try {
    st('', '챙째챗짼째 챙짚...');

    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'interactive' });
    if (ctx.state === 'suspended') await ctx.resume();

    // 17Hz 챙쨈챙 챙짙쩌챠 창 iOS 챙짚챘챙짚 챙쨍챙 챘째짹챗쨌쨍챘쩌챙쨈챘 챙 챙짠
    if (!osc) {
      osc = ctx.createOscillator();
      const g = ctx.createGain();
      g.gain.value = 0.00001;
      osc.frequency.value = 17;
      osc.connect(g);
      g.connect(ctx.destination);
      osc.start();
    }

    stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: false }
    });

    src = ctx.createMediaStreamSource(stream);
    gain = ctx.createGain();
    gain.gain.value = document.getElementById('vol').value / 100;
    analyser = ctx.createAnalyser();
    analyser.fftSize = 128;

    src.connect(gain);
    gain.connect(analyser);
    gain.connect(ctx.destination);

    on = true;
    document.getElementById('micBtn').classList.add('on');
    document.getElementById('btnTxt').textContent = '챘챗쨍째';
    st('on', '챨쨈 LIVE 창 챘짧짤챙챘짝짭 챙쨋챘 짜 챙짚');
    draw();

  } catch (e) {
    if (e.name === 'NotAllowedError') {
      st('err', '챘짠챙쨈챠짭 챗쨋챠 챗짹째챘쨋챘짢');
      alert('챙짚챙  챙짹 창 Safari 창 챘짠챙쨈챠짭 창 챠챙짤');
    } else {
      st('err', e.message);
    }
  }
}

function stop() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  [src, gain, analyser].forEach(n => n && n.disconnect());
  src = gain = analyser = stream = null;
  on = false;
  if (raf) { cancelAnimationFrame(raf); raf = null; }
  bars.forEach(b => { b.style.height = '4px'; b.style.background = '#222'; });
  document.getElementById('micBtn').classList.remove('on');
  document.getElementById('btnTxt').textContent = '챙챙';
  st('', '챘짠챙쨈챠짭 챗쨘쩌챙짠');
}

function setVol(v) {
  document.getElementById('volVal').textContent = v + '%';
  if (gain) gain.gain.value = v / 100;
}

function draw() {
  if (!analyser) return;
  const d = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(d);
  const step = Math.floor(d.length / N);
  bars.forEach((b, i) => {
    const v = d[i * step] / 255;
    b.style.height = Math.max(4, v * 32) + 'px';
    b.style.background = v > 0.65 ? '#cc88ff' : v > 0.25 ? '#00e8cc' : '#333';
  });
  raf = requestAnimationFrame(draw);
}

// 챘째짹챗쨌쨍챘쩌챙쨈챘 챘쨀쨉챗쨌챙 AudioContext 챙짭챗째
['visibilitychange', 'pageshow', 'focus'].forEach(ev =>
  window.addEventListener(ev, () => ctx && ctx.state === 'suspended' && ctx.resume())
);

// Service Worker 챘짹챘징
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
